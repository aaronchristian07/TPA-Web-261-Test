syntax = "proto3";

package auth;

option go_package = "github.com/TPA-WEB-261-TEST/contracts/auth-service/gen;auth";

service AuthService {
    rpc Register (RegisterRequest) returns (RegisterResponse);
    rpc VerifyRegister (VerifyOTPRequest) returns (VerifyOTPResponse);
    rpc ResendOTP (ResendOTPRequest) returns (ResendOTPResponse);
    rpc LoginGoogle (LoginGoogleRequest) returns (LoginResponse);
    rpc Login (LoginRequest) returns (LoginResponse);
    rpc Logout (LogoutRequest) returns (LogoutResponse);
    rpc ForgotPassword (ForgotPasswordRequest) returns (ForgotPasswordResponse);
    rpc VerifyForgotPassword (VerifyOTPRequest) returns (VerifyOTPResponse);
    rpc ResetPassword (ResetPasswordRequest) returns (ResetPasswordResponse);
    rpc ValidateToken (ValidateTokenRequest) returns (ValidateTokenResponse);
    rpc RefreshToken (RefreshTokenRequest) returns (RefreshTokenResponse);
}

message RegisterRequest {
    string email    = 1;
    string password = 2;
    string username    = 3;
    string date_of_birth = 4;
    string avatar  = 5;
}

message RegisterResponse {
    string user_id = 1;
    string message = 2;
}

message LoginRequest {
    string email_or_username    = 1;
    string password = 2;
}

message LoginResponse {
    string access_token  = 1;
    string refresh_token = 2;
}

message LogoutRequest {
    string access_token = 1;
}

message LogoutResponse {
    bool success = 1;
}

message ValidateTokenRequest {
    string token = 1;
}

message ValidateTokenResponse {
    bool   valid   = 1;
    string user_id = 2;
    string email   = 3;
    string role    = 4;
}

message RefreshTokenRequest {
    string refresh_token = 1;
}

message RefreshTokenResponse {
    string access_token  = 1;
    string refresh_token = 2;
}

message VerifyOTPRequest {
    string email = 1;
    string code  = 2;
}

message VerifyOTPResponse {
    bool   success = 1;
    string message = 2;
}

message ResendOTPRequest {
    string email = 1;
}

message ResendOTPResponse {
    bool   success = 1;
    string message = 2;
}

message LoginGoogleRequest {
    string id_token = 1;
}

message ForgotPasswordRequest {
    string email = 1;
}

message ForgotPasswordResponse {
    bool   success = 1;
    string message = 2;
}

message ResetPasswordRequest {
    string email        = 1;
    string code         = 2;
    string new_password = 3;
}

message ResetPasswordResponse {
    bool   success = 1;
    string message = 2;
}