events {}


http{

    resolver 127.0.0.11 valid=10s;

    log_format routed '$remote_addr "$request" status=$status upstream=$upstream_addr';

    server{
        listen 80;

        location / {
            return 200 'NGINX gateway up\n';
            add_header Content-Type text/plain;
        }

        # location /api/auth{
        #     set $auth_upstream auth-service:8001;
        #     proxy_pass http://$$auth_upstream$request_uri;
        #     proxy_set_header Host $host;
        # }
    }
}